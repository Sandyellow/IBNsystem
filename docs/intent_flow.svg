<svg viewBox="0 0 820 285" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
    <marker id="b" markerWidth="7" markerHeight="7" refX="2" refY="3.5" orient="auto">
      <path d="M7,0 L7,7 L0,3.5 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="820" height="285" fill="#fff"/>

  <!-- ── 顶部标题 ── -->
  <text x="410" y="16" fill="#aaa" font-size="9.5" text-anchor="middle" letter-spacing="1.5">INTENT PROCESSING FLOW</text>

  <!-- ══════════════════════════════════════════════════
       主流程：5 个方框横排
  ══════════════════════════════════════════════════ -->

  <!-- 1. 自然语言输入 -->
  <rect x="20" y="30" width="110" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="75" y="57" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">自然语言</text>
  <text x="75" y="72" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">输入</text>
  <text x="75" y="95" fill="#999" font-size="8.5" text-anchor="middle">前端输入框</text>

  <!-- 1 → 2 -->
  <line x1="130" y1="67" x2="147" y2="67" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 2. LangGraph Agent（加粗边框，区分核心节点） -->
  <rect x="149" y="20" width="148" height="95" rx="5" fill="#fff" stroke="#333" stroke-width="1.8"/>
  <text x="223" y="43" fill="#333" font-size="10.5" font-weight="700" text-anchor="middle">LangGraph Agent</text>
  <line x1="165" y1="50" x2="281" y2="50" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="223" y="67" fill="#555" font-size="9.5" text-anchor="middle">意图解析 / 参数提取</text>
  <text x="223" y="82" fill="#555" font-size="9.5" text-anchor="middle">输出 IntentList</text>
  <text x="223" y="103" fill="#999" font-size="8.5" text-anchor="middle">LangChain · OpenAI 兼容接口</text>

  <!-- 2 → 3 -->
  <line x1="297" y1="67" x2="314" y2="67" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 3. Intent Validator -->
  <rect x="316" y="30" width="130" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="381" y="57" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Intent Validator</text>
  <text x="381" y="72" fill="#666" font-size="9" text-anchor="middle">拓扑 · 安全 · 冲突</text>
  <text x="381" y="95" fill="#999" font-size="8.5" text-anchor="middle">三层校验</text>

  <!-- 3 → 4 -->
  <line x1="446" y1="67" x2="463" y2="67" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 4. Policy Executor -->
  <rect x="465" y="30" width="130" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="530" y="57" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Policy Executor</text>
  <text x="530" y="72" fill="#666" font-size="9" text-anchor="middle">OpenFlow 指令构造</text>
  <text x="530" y="95" fill="#999" font-size="8.5" text-anchor="middle">策略持久化</text>

  <!-- 4 → 5 -->
  <line x1="595" y1="67" x2="612" y2="67" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 5. Ryu REST API -->
  <rect x="614" y="30" width="110" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="669" y="63" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Ryu REST API</text>
  <text x="669" y="95" fill="#999" font-size="8.5" text-anchor="middle">:8080</text>

  <!-- 5 → OVS (向下) -->
  <line x1="669" y1="105" x2="669" y2="150" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- OVS -->
  <rect x="614" y="152" width="110" height="48" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="669" y="174" fill="#333" font-size="10" font-weight="600" text-anchor="middle">OVS 交换机</text>
  <text x="669" y="191" fill="#999" font-size="8.5" text-anchor="middle">流表规则生效</text>

  <!-- ══════════════════════════════════════════════════
       工具调用分支（Agent 下方，虚线框）
  ══════════════════════════════════════════════════ -->

  <!-- 向下箭头（调用） -->
  <line x1="200" y1="115" x2="200" y2="153" stroke="#777" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>
  <text x="189" y="138" fill="#999" font-size="8.5" text-anchor="end">调用</text>

  <!-- 向上箭头（返回） -->
  <line x1="246" y1="153" x2="246" y2="115" stroke="#777" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#a)"/>
  <text x="250" y="138" fill="#999" font-size="8.5">返回</text>

  <!-- 工具调用虚线框 -->
  <rect x="149" y="155" width="148" height="62" rx="5" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="223" y="177" fill="#666" font-size="9.5" font-weight="600" text-anchor="middle">工具调用（可选）</text>
  <text x="223" y="194" fill="#888" font-size="9" text-anchor="middle">get_node_location</text>
  <text x="223" y="208" fill="#888" font-size="9" text-anchor="middle">get_active_policies</text>

  <!-- ══════════════════════════════════════════════════
       WebSocket 回路（底部虚线）
  ══════════════════════════════════════════════════ -->
  <line x1="724" y1="258" x2="22" y2="258" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#b)"/>
  <text x="410" y="250" fill="#999" font-size="9" text-anchor="middle">WebSocket  推送执行结果至前端</text>

  <!-- 垂直连接线：OVS底部 → 虚线 -->
  <line x1="669" y1="200" x2="669" y2="258" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- 垂直连接线：Input底部 → 虚线 -->
  <line x1="75" y1="105" x2="75" y2="258" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,2"/>

</svg>
