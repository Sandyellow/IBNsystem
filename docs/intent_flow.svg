<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
    <marker id="b" markerWidth="7" markerHeight="7" refX="2" refY="3.5" orient="auto">
      <path d="M7,0 L7,7 L0,3.5 z" fill="#666"/>
    </marker>
    <marker id="c" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#888"/>
    </marker>
  </defs>

  <rect width="820" height="300" fill="#fff"/>

  <!-- ── 顶部无需标题，由 README 提供 ── -->

  <!-- ══════════════════════════════════════════════════
       主流程：5 个方框横排
  ══════════════════════════════════════════════════ -->

  <!-- 1. 自然语言输入 -->
  <rect x="20" y="45" width="110" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="75" y="72" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">自然语言</text>
  <text x="75" y="87" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">输入</text>
  <text x="75" y="110" fill="#999" font-size="8.5" text-anchor="middle">前端输入框</text>

  <!-- 1 → 2 -->
  <line x1="130" y1="82" x2="147" y2="82" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 2. LangGraph Agent -->
  <rect x="149" y="35" width="148" height="95" rx="5" fill="#fff" stroke="#333" stroke-width="1.8"/>
  <text x="223" y="58" fill="#333" font-size="10.5" font-weight="700" text-anchor="middle">LangGraph Agent</text>
  <line x1="165" y1="65" x2="281" y2="65" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="223" y="82" fill="#555" font-size="9.5" text-anchor="middle">意图解析 / 参数提取</text>
  <text x="223" y="97" fill="#555" font-size="9.5" text-anchor="middle">输出 IntentList</text>
  <text x="223" y="118" fill="#999" font-size="8.5" text-anchor="middle">LangChain · OpenAI 接口</text>

  <!-- 2 → 3 -->
  <line x1="297" y1="82" x2="314" y2="82" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 3. Intent Validator -->
  <rect x="316" y="45" width="130" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="381" y="72" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Intent Validator</text>
  <text x="381" y="87" fill="#666" font-size="9" text-anchor="middle">拓扑 · 安全 · 冲突</text>
  <text x="381" y="110" fill="#999" font-size="8.5" text-anchor="middle">三层校验</text>

  <!-- 3 → 4 -->
  <line x1="446" y1="82" x2="463" y2="82" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 4. Policy Executor -->
  <rect x="465" y="45" width="130" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="530" y="72" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Policy Executor</text>
  <text x="530" y="87" fill="#666" font-size="9" text-anchor="middle">构造 OpenFlow 指令</text>
  <text x="530" y="110" fill="#999" font-size="8.5" text-anchor="middle">状态持久化</text>

  <!-- 4 → 5 -->
  <line x1="595" y1="82" x2="612" y2="82" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- 5. Ryu REST API -->
  <rect x="614" y="45" width="110" height="75" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="669" y="78" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Ryu REST API</text>
  <text x="669" y="110" fill="#999" font-size="8.5" text-anchor="middle">:8080</text>

  <!-- 5 → OVS (向下) -->
  <line x1="669" y1="120" x2="669" y2="165" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- OVS -->
  <rect x="614" y="167" width="110" height="48" rx="5" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
  <text x="669" y="189" fill="#333" font-size="10" font-weight="600" text-anchor="middle">OVS 交换机</text>
  <text x="669" y="206" fill="#999" font-size="8.5" text-anchor="middle">流表规则生效</text>


  <!-- ══════════════════════════════════════════════════
       回滚反馈路径（单色正交折线，灰色虚线）
  ══════════════════════════════════════════════════ -->

  <!-- 向下箭头（调用） -->
  <line x1="200" y1="130" x2="200" y2="168" stroke="#777" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#b)"/>
  <text x="189" y="153" fill="#999" font-size="8.5" text-anchor="end">调用</text>

  <!-- 向上箭头（返回） -->
  <line x1="246" y1="168" x2="246" y2="130" stroke="#777" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#b)"/>
  <text x="250" y="153" fill="#999" font-size="8.5">返回</text>

  <!-- 工具调用虚线框 -->
  <rect x="149" y="170" width="148" height="74" rx="5" fill="#fafafa" stroke="#ccc" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="223" y="189" fill="#666" font-size="9.5" font-weight="600" text-anchor="middle">工具调用（可选）</text>
  <text x="223" y="205" fill="#888" font-size="9" text-anchor="middle">查询拓扑 / 活跃策略</text>
  <text x="223" y="221" fill="#555" font-size="9" font-weight="600" text-anchor="middle">撤销策略 (主动回溯)</text>
  <text x="223" y="235" fill="#aaa" font-size="8.5" text-anchor="middle">cancel_active_policy</text>

  <!-- 回溯 1：Agent 主动撤销策略仅作为工具箱能力展示，不单独画连线 -->

  <!-- 回溯 2：Validator 校验失败，反馈 ReAct 重试 -->
  <path d="M 381 45 L 381 25 L 223 25 L 223 33" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#c)"/>
  <text x="302" y="20" fill="#888" font-size="8.5" text-anchor="middle">校验异常反馈 (重试)</text>

  <!-- 回溯 3：Executor 下发失败自动回滚 -->
  <path d="M 500 120 L 500 140 L 560 140 L 560 122" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#c)"/>
  <text x="530" y="153" fill="#888" font-size="8.5" text-anchor="middle">执行失败自动回滚</text>


  <!-- ══════════════════════════════════════════════════
       WebSocket 回路（底部虚线）
  ══════════════════════════════════════════════════ -->
  <line x1="724" y1="273" x2="22" y2="273" stroke="#888" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#b)"/>
  <text x="410" y="265" fill="#999" font-size="9" text-anchor="middle">WebSocket  推送执行结果至前端</text>

  <!-- 垂直连接线：OVS底部 → 虚线 -->
  <line x1="669" y1="215" x2="669" y2="273" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- 垂直连接线：Input底部 → 虚线 -->
  <line x1="75" y1="120" x2="75" y2="273" stroke="#ccc" stroke-width="0.8" stroke-dasharray="3,2"/>

</svg>
