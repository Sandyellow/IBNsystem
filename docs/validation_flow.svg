<svg viewBox="0 0 640 458" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="640" height="458" fill="#fff"/>

  <!-- ── 顶部无需标题，由 README 提供 ── -->

  <!-- ══════════════════════════════════════════════════
       主流程（竖向，左列 x_center=220）
  ══════════════════════════════════════════════════ -->

  <!-- 入口 -->
  <rect x="160" y="24" width="120" height="34" rx="5" fill="#f0f0f0" stroke="#999" stroke-width="1"/>
  <text x="220" y="46" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">新策略提交</text>

  <!-- 入口 → L1 -->
  <line x1="220" y1="58" x2="220" y2="86" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- ── L1 ── -->
  <rect x="145" y="88" width="150" height="56" rx="5" fill="#fff" stroke="#555" stroke-width="1.5"/>
  <text x="220" y="110" fill="#333" font-size="10" font-weight="700" text-anchor="middle">L1  拓扑节点校验</text>
  <text x="220" y="128" fill="#666" font-size="9" text-anchor="middle">涉及节点是否存在于当前拓扑？</text>

  <!-- L1 通过 → L2 -->
  <line x1="220" y1="144" x2="220" y2="182" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <text x="208" y="167" fill="#888" font-size="9" text-anchor="end">通过</text>

  <!-- L1 失败 → 右侧拒绝框 -->
  <line x1="295" y1="116" x2="352" y2="116" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <text x="322" y="110" fill="#888" font-size="9" text-anchor="middle">失败</text>
  <rect x="354" y="88" width="188" height="56" rx="5" fill="#f7f7f7" stroke="#aaa" stroke-width="1"/>
  <text x="448" y="110" fill="#333" font-size="10" font-weight="600" text-anchor="middle">拒绝</text>
  <text x="448" y="128" fill="#777" font-size="9" text-anchor="middle">节点不在当前拓扑中，拒绝</text>

  <!-- ── L2 ── -->
  <rect x="145" y="184" width="150" height="56" rx="5" fill="#fff" stroke="#555" stroke-width="1.5"/>
  <text x="220" y="206" fill="#333" font-size="10" font-weight="700" text-anchor="middle">L2  操作参数检查</text>
  <text x="220" y="224" fill="#666" font-size="9" text-anchor="middle">操作是否指定了明确目标？</text>

  <!-- L2 通过 → L3 -->
  <line x1="220" y1="240" x2="220" y2="278" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <text x="208" y="263" fill="#888" font-size="9" text-anchor="end">通过</text>

  <!-- L2 失败 → 右侧拒绝框 -->
  <line x1="295" y1="212" x2="352" y2="212" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <text x="322" y="206" fill="#888" font-size="9" text-anchor="middle">失败</text>
  <rect x="354" y="184" width="188" height="56" rx="5" fill="#f7f7f7" stroke="#aaa" stroke-width="1"/>
  <text x="448" y="206" fill="#333" font-size="10" font-weight="600" text-anchor="middle">拒绝</text>
  <text x="448" y="224" fill="#777" font-size="9" text-anchor="middle">目标不明确，无法执行</text>

  <!-- ── L3 ── -->
  <rect x="145" y="280" width="150" height="56" rx="5" fill="#fff" stroke="#555" stroke-width="1.5"/>
  <text x="220" y="302" fill="#333" font-size="10" font-weight="700" text-anchor="middle">L3  冲突检测</text>
  <text x="220" y="320" fill="#666" font-size="9" text-anchor="middle">与已有活跃策略对比</text>

  <!-- L3 → 分叉 -->
  <line x1="220" y1="336" x2="220" y2="356" stroke="#333" stroke-width="1"/>
  <!-- 水平分叉线 -->
  <line x1="35" y1="356" x2="605" y2="356" stroke="#333" stroke-width="1"/>
  <!-- 4 条垂直下箭头 -->
  <line x1="85"  y1="356" x2="85"  y2="376" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <line x1="235" y1="356" x2="235" y2="376" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <line x1="390" y1="356" x2="390" y2="376" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
  <line x1="555" y1="356" x2="555" y2="376" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

  <!-- ══════════════════════════════════════════════════
       4 个结果框
  ══════════════════════════════════════════════════ -->

  <!-- 结果 1：无冲突 → 执行 -->
  <rect x="20" y="378" width="130" height="62" rx="5" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="85" y="400" fill="#333" font-size="9.5" font-weight="700" text-anchor="middle">无冲突</text>
  <line x1="36" y1="408" x2="134" y2="408" stroke="#ddd" stroke-width="0.8"/>
  <text x="85" y="424" fill="#555" font-size="9" text-anchor="middle">执行下发</text>
  <text x="85" y="438" fill="#888" font-size="8.5" text-anchor="middle">OpenFlow 规则生效</text>

  <!-- 结果 2：完全重复 → 跳过 -->
  <rect x="170" y="378" width="130" height="62" rx="5" fill="#f7f7f7" stroke="#aaa" stroke-width="1"/>
  <text x="235" y="400" fill="#333" font-size="9.5" font-weight="600" text-anchor="middle">完全重复</text>
  <line x1="186" y1="408" x2="284" y2="408" stroke="#ddd" stroke-width="0.8"/>
  <text x="235" y="424" fill="#666" font-size="9" text-anchor="middle">幂等跳过</text>
  <text x="235" y="438" fill="#888" font-size="8.5" text-anchor="middle">已存在相同策略</text>

  <!-- 结果 3：参数不同 → 等待确认 -->
  <rect x="325" y="378" width="130" height="62" rx="5" fill="#f7f7f7" stroke="#aaa" stroke-width="1"/>
  <text x="390" y="400" fill="#333" font-size="9.5" font-weight="600" text-anchor="middle">同类型参数不同</text>
  <line x1="341" y1="408" x2="439" y2="408" stroke="#ddd" stroke-width="0.8"/>
  <text x="390" y="424" fill="#666" font-size="9" text-anchor="middle">等待用户确认</text>
  <text x="390" y="438" fill="#888" font-size="8.5" text-anchor="middle">是否替换旧策略</text>

  <!-- 结果 4：互斥策略 → 拒绝 -->
  <rect x="490" y="378" width="130" height="62" rx="5" fill="#f7f7f7" stroke="#aaa" stroke-width="1"/>
  <text x="555" y="400" fill="#333" font-size="9.5" font-weight="600" text-anchor="middle">互斥策略</text>
  <line x1="506" y1="408" x2="604" y2="408" stroke="#ddd" stroke-width="0.8"/>
  <text x="555" y="424" fill="#666" font-size="9" text-anchor="middle">直接拒绝</text>
  <text x="555" y="438" fill="#888" font-size="8.5" text-anchor="middle">需先撤销冲突策略</text>

</svg>
