<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- ─── LAYER LABELS (left side) ──────────────────────────── -->
  <text x="18" y="140" fill="#888" font-size="9.5" font-weight="600" text-anchor="middle" transform="rotate(-90,18,140)">应用层 (Application Layer)</text>
  <text x="18" y="325" fill="#888" font-size="9.5" font-weight="600" text-anchor="middle" transform="rotate(-90,18,325)">控制层 (Control Layer)</text>
  <text x="18" y="440" fill="#888" font-size="9.5" font-weight="600" text-anchor="middle" transform="rotate(-90,18,440)">数据层 (Data Layer)</text>

  <!-- ─── LAYER 1: APPLICATION ────────────────────────────────── -->
  <rect x="32" y="20" width="752" height="240" rx="6" fill="#f9f9f9" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Row 1: Frontend & Input -->
  <rect x="52" y="50" width="356" height="55" rx="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="230" y="72" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">自然语言输入</text>
  <text x="230" y="90" fill="#555" font-size="9.5" text-anchor="middle">"隔离 h1 和 h3" / "限速 h2 至 5Mbps"</text>

  <rect x="444" y="50" width="324" height="55" rx="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="606" y="72" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">前端界面</text>
  <text x="606" y="90" fill="#555" font-size="9.5" text-anchor="middle">力导向拓扑图 · 实时流量图表</text>

  <!-- Post Arrow -->
  <line x1="132" y1="105" x2="132" y2="132" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  
  <!-- Row 2: Pipeline -->
  <!-- Step 1: Agent -->
  <rect x="52" y="140" width="160" height="105" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="52" y="140" width="160" height="24" rx="5" fill="#333"/>
  <rect x="52" y="156" width="160" height="8" fill="#333"/>
  <text x="132" y="156" fill="#fff" font-size="9.5" font-weight="600" text-anchor="middle">LangGraph Agent</text>
  <text x="132" y="180" fill="#333" font-size="9" text-anchor="middle">意图解析 / 提取参数</text>
  <text x="132" y="195" fill="#333" font-size="9" text-anchor="middle">调用查询工具</text>
  <text x="132" y="210" fill="#333" font-size="9" text-anchor="middle">复合指令拆分</text>
  <text x="132" y="230" fill="#777" font-size="8" text-anchor="middle">LangChain / LLM</text>

  <line x1="212" y1="192" x2="240" y2="192" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 2: Validator -->
  <rect x="248" y="140" width="160" height="105" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="248" y="140" width="160" height="24" rx="5" fill="#333"/>
  <rect x="248" y="156" width="160" height="8" fill="#333"/>
  <text x="328" y="156" fill="#fff" font-size="9.5" font-weight="600" text-anchor="middle">Intent Validator</text>
  <text x="328" y="180" fill="#333" font-size="9" text-anchor="middle">L1 拓扑节点校验</text>
  <text x="328" y="195" fill="#333" font-size="9" text-anchor="middle">L2 操作参数检查</text>
  <text x="328" y="210" fill="#333" font-size="9" text-anchor="middle">L3 策略冲突检测</text>

  <line x1="408" y1="192" x2="436" y2="192" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 3: Executor -->
  <rect x="444" y="140" width="160" height="105" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="444" y="140" width="160" height="24" rx="5" fill="#333"/>
  <rect x="444" y="156" width="160" height="8" fill="#333"/>
  <text x="524" y="156" fill="#fff" font-size="9.5" font-weight="600" text-anchor="middle">Policy Executor</text>
  <text x="524" y="180" fill="#333" font-size="9" text-anchor="middle">构造 OpenFlow 指令</text>
  <text x="524" y="195" fill="#333" font-size="9" text-anchor="middle">Meter 表带宽限速</text>
  <text x="524" y="210" fill="#333" font-size="9" text-anchor="middle">执行异常回滚</text>

  <line x1="604" y1="192" x2="632" y2="192" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 4: Ryu Client -->
  <rect x="640" y="140" width="128" height="105" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="640" y="140" width="128" height="24" rx="5" fill="#333"/>
  <rect x="640" y="156" width="128" height="8" fill="#333"/>
  <text x="704" y="156" fill="#fff" font-size="9.5" font-weight="600" text-anchor="middle">Ryu Client</text>
  <text x="704" y="180" fill="#333" font-size="9" text-anchor="middle">HTTP → REST</text>
  <text x="704" y="195" fill="#333" font-size="9" text-anchor="middle">流表 CRUD</text>
  <text x="704" y="210" fill="#333" font-size="9" text-anchor="middle">端口统计轮询</text>

  <!-- WebSocket -->
  <path d="M 704 140 L 704 120 L 606 120 L 606 105" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="655" y="115" fill="#555" font-size="8">WebSocket /ws</text>


  <!-- ─── LAYER 2: CONTROL ───────────────────────────────────── -->
  <rect x="32" y="280" width="752" height="70" rx="6" fill="#f9f9f9" stroke="#d0d0d0" stroke-width="1"/>
  
  <rect x="250" y="295" width="300" height="40" rx="5" fill="#fff" stroke="#555" stroke-width="1.5"/>
  <text x="400" y="314" fill="#333" font-size="10.5" font-weight="600" text-anchor="middle">Ryu SDN Controller</text>
  <text x="400" y="328" fill="#666" font-size="8.5" text-anchor="middle">REST API · LLDP 拓扑发现 · OpenFlow 1.3</text>

  <!-- API Call Arrow -->
  <path d="M 704 245 L 704 315 L 558 315" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  
  <!-- Northbound API Badge -->
  <rect x="639" y="270" width="130" height="20" rx="10" fill="#fff" stroke="#555" stroke-width="1"/>
  <text x="704" y="283" fill="#333" font-size="9" font-weight="600" text-anchor="middle">北向接口 (REST API)</text>


  <!-- ─── LAYER 3: DATA (INFRASTRUCTURE) ─────────────────────── -->
  <rect x="32" y="370" width="752" height="110" rx="6" fill="#f9f9f9" stroke="#d0d0d0" stroke-width="1"/>
  <text x="80" y="388" fill="#555" font-size="9.5" font-weight="600" text-anchor="start">Mininet &amp; Open vSwitch</text>

  <!-- OpenFlow Line -->
  <line x1="400" y1="335" x2="400" y2="405" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  
  <!-- Southbound API Badge -->
  <rect x="330" y="360" width="140" height="20" rx="10" fill="#fff" stroke="#555" stroke-width="1"/>
  <text x="400" y="373" fill="#333" font-size="9" font-weight="600" text-anchor="middle">南向接口 (OpenFlow)</text>

  <!-- Switches & Topology -->
  <rect x="250" y="405" width="40" height="20" rx="3" fill="#e0e0e0" stroke="#777" stroke-width="1"/>
  <text x="270" y="419" fill="#333" font-size="9" text-anchor="middle">s1</text>

  <rect x="380" y="405" width="40" height="20" rx="3" fill="#e0e0e0" stroke="#777" stroke-width="1"/>
  <text x="400" y="419" fill="#333" font-size="9" text-anchor="middle">s2</text>

  <rect x="510" y="405" width="40" height="20" rx="3" fill="#e0e0e0" stroke="#777" stroke-width="1"/>
  <text x="530" y="419" fill="#333" font-size="9" text-anchor="middle">s3</text>

  <!-- Switch Links -->
  <line x1="290" y1="415" x2="380" y2="415" stroke="#777" stroke-width="1.5"/>
  <line x1="420" y1="415" x2="510" y2="415" stroke="#777" stroke-width="1.5"/>

  <!-- Hosts -->
  <rect x="200" y="445" width="30" height="16" rx="2" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="215" y="457" fill="#555" font-size="8" text-anchor="middle">h1</text>
  <line x1="270" y1="425" x2="215" y2="445" stroke="#aaa" stroke-width="1"/>

  <rect x="290" y="445" width="30" height="16" rx="2" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="305" y="457" fill="#555" font-size="8" text-anchor="middle">h2</text>
  <line x1="270" y1="425" x2="305" y2="445" stroke="#aaa" stroke-width="1"/>

  <rect x="440" y="445" width="30" height="16" rx="2" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="455" y="457" fill="#555" font-size="8" text-anchor="middle">h3</text>
  <line x1="530" y1="425" x2="455" y2="445" stroke="#aaa" stroke-width="1"/>

  <rect x="550" y="445" width="30" height="16" rx="2" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="565" y="457" fill="#555" font-size="8" text-anchor="middle">h4</text>
  <line x1="530" y1="425" x2="565" y2="445" stroke="#aaa" stroke-width="1"/>

  <!-- ─── ARROW MARKER ──────────────────────────────────────── -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>

</svg>
