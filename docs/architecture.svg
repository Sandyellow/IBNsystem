<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="800" height="480" fill="#ffffff"/>

  <!-- ─── LAYER LABELS (left side) ──────────────────────────── -->
  <text x="18" y="95"  fill="#888" font-size="9" text-anchor="middle" transform="rotate(-90,18,95)">用户层</text>
  <text x="18" y="295" fill="#888" font-size="9" text-anchor="middle" transform="rotate(-90,18,295)">意图引擎</text>
  <text x="18" y="435" fill="#888" font-size="9" text-anchor="middle" transform="rotate(-90,18,435)">网络层</text>

  <!-- ─── LAYER 1: USER ──────────────────────────────────────── -->
  <rect x="32" y="20" width="752" height="140" rx="6" fill="#f9f9f9" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Input box -->
  <rect x="56" y="48" width="320" height="84" rx="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="216" y="72"  fill="#333" font-size="11" font-weight="600" text-anchor="middle">自然语言输入</text>
  <text x="216" y="94"  fill="#555" font-size="10.5" text-anchor="middle">"隔离 h1 和 h3 的通信"</text>
  <text x="216" y="112" fill="#888" font-size="9.5"  text-anchor="middle">或  "限制 h2 到 h4 的带宽至 5 Mbps"</text>
  <text x="216" y="126" fill="#888" font-size="9.5"  text-anchor="middle">或  "先限速 h1→h2，再隔离 h3"（复合指令）</text>

  <!-- Frontend box -->
  <rect x="408" y="48" width="352" height="84" rx="5" fill="#fff" stroke="#999" stroke-width="1"/>
  <text x="584" y="72"  fill="#333" font-size="11" font-weight="600" text-anchor="middle">前端界面</text>
  <text x="584" y="94"  fill="#555" font-size="10"  text-anchor="middle">拓扑力导向图 · 端口流量统计图表</text>
  <text x="584" y="112" fill="#555" font-size="10"  text-anchor="middle">意图历史记录 · 确认对话框</text>
  <text x="584" y="126" fill="#888" font-size="9.5"  text-anchor="middle">React 19 / Vite / Zustand</text>

  <!-- ─── VERTICAL CONNECTORS: User → Engine ───────────────── -->
  <!-- Left: POST intent -->
  <line x1="216" y1="132" x2="216" y2="174" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="220"  y="158" fill="#555" font-size="8.5">POST /api/intent/process</text>

  <!-- Right: WebSocket (bidirectional) -->
  <line x1="584" y1="132" x2="584" y2="174" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="596" y1="174" x2="596" y2="132" stroke="#333" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="603"  y="158" fill="#555" font-size="8.5">WebSocket /ws</text>

  <!-- ─── LAYER 2: ENGINE ───────────────────────────────────── -->
  <rect x="32" y="176" width="752" height="196" rx="6" fill="#f9f9f9" stroke="#d0d0d0" stroke-width="1"/>

  <!-- Pipeline boxes (4 steps) -->
  <!-- Step 1: Agent -->
  <rect x="52" y="200" width="160" height="148" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="52" y="200" width="160" height="26"  rx="5" fill="#333"/>
  <rect x="52" y="218" width="160" height="8"   fill="#333"/>
  <text x="132" y="218" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">LangGraph Agent</text>
  <text x="132" y="246" fill="#333" font-size="9.5" text-anchor="middle">LLM 解析用户意图</text>
  <text x="132" y="261" fill="#333" font-size="9.5" text-anchor="middle">提取结构化参数</text>
  <text x="132" y="276" fill="#333" font-size="9.5" text-anchor="middle">调用查询工具</text>
  <text x="132" y="291" fill="#333" font-size="9.5" text-anchor="middle">复合指令拆分</text>
  <line x1="68" y1="305" x2="196" y2="305" stroke="#ccc" stroke-width="0.8"/>
  <text x="132" y="322" fill="#777" font-size="8.5" text-anchor="middle">IntentList 输出</text>
  <text x="132" y="337" fill="#777" font-size="8.5" text-anchor="middle">LangChain / OpenAI API</text>

  <!-- Arrow 1→2 -->
  <line x1="212" y1="274" x2="248" y2="274" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 2: Validator -->
  <rect x="248" y="200" width="160" height="148" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="248" y="200" width="160" height="26"  rx="5" fill="#333"/>
  <rect x="248" y="218" width="160" height="8"   fill="#333"/>
  <text x="328" y="218" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Intent Validator</text>
  <text x="328" y="246" fill="#333" font-size="9.5" text-anchor="middle">L1  节点拓扑合法性</text>
  <text x="328" y="261" fill="#333" font-size="9.5" text-anchor="middle">L2  安全限制检查</text>
  <text x="328" y="276" fill="#333" font-size="9.5" text-anchor="middle">L3  与已有策略冲突</text>
  <line x1="264" y1="293" x2="392" y2="293" stroke="#ccc" stroke-width="0.8"/>
  <text x="328" y="310" fill="#777" font-size="8.5" text-anchor="middle">冲突 → BLOCK</text>
  <text x="328" y="325" fill="#777" font-size="8.5" text-anchor="middle">参数同类 → 要求确认</text>
  <text x="328" y="340" fill="#777" font-size="8.5" text-anchor="middle">重复 → 幂等跳过</text>

  <!-- Arrow 2→3 -->
  <line x1="408" y1="274" x2="444" y2="274" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 3: Executor -->
  <rect x="444" y="200" width="160" height="148" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="444" y="200" width="160" height="26"  rx="5" fill="#333"/>
  <rect x="444" y="218" width="160" height="8"   fill="#333"/>
  <text x="524" y="218" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Policy Executor</text>
  <text x="524" y="246" fill="#333" font-size="9.5" text-anchor="middle">构造 OpenFlow 指令</text>
  <text x="524" y="261" fill="#333" font-size="9.5" text-anchor="middle">Meter 表带宽限速</text>
  <text x="524" y="276" fill="#333" font-size="9.5" text-anchor="middle">VLAN / 多路径路由</text>
  <line x1="460" y1="293" x2="588" y2="293" stroke="#ccc" stroke-width="0.8"/>
  <text x="524" y="310" fill="#777" font-size="8.5" text-anchor="middle">启动时重下发已有策略</text>
  <text x="524" y="325" fill="#777" font-size="8.5" text-anchor="middle">策略持久化存储</text>

  <!-- Arrow 3→4 -->
  <line x1="604" y1="274" x2="640" y2="274" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 4: Ryu Client -->
  <rect x="640" y="200" width="128" height="148" rx="5" fill="#fff" stroke="#555" stroke-width="1.2"/>
  <rect x="640" y="200" width="128" height="26"  rx="5" fill="#333"/>
  <rect x="640" y="218" width="128" height="8"   fill="#333"/>
  <text x="704" y="218" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Ryu Client</text>
  <text x="704" y="246" fill="#333" font-size="9.5" text-anchor="middle">HTTP → REST :8080</text>
  <text x="704" y="261" fill="#333" font-size="9.5" text-anchor="middle">流表 CRUD</text>
  <text x="704" y="276" fill="#333" font-size="9.5" text-anchor="middle">健康检查</text>

  <!-- ─── VERTICAL CONNECTOR: Engine → SDN ─────────────────── -->
  <line x1="704" y1="372" x2="704" y2="406" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>
  <text x="710"  y="394" fill="#555" font-size="8.5">Ryu REST API</text>

  <!-- ─── LAYER 3: SDN ───────────────────────────────────────── -->
  <rect x="32" y="408" width="752" height="56" rx="6" fill="#f9f9f9" stroke="#d0d0d0" stroke-width="1"/>

  <text x="140" y="432" fill="#333" font-size="10" font-weight="600" text-anchor="middle">Ryu Controller</text>
  <text x="140" y="448" fill="#777" font-size="9"   text-anchor="middle">LLDP 拓扑发现 · OpenFlow 1.3</text>

  <line x1="200" y1="435" x2="248" y2="435" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <text x="340" y="432" fill="#333" font-size="10" font-weight="600" text-anchor="middle">Open vSwitch</text>
  <text x="340" y="448" fill="#777" font-size="9"   text-anchor="middle">s1 / s2 / s3  +  h1…hN</text>

  <line x1="440" y1="435" x2="488" y2="435" stroke="#555" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="464" y="428" fill="#888" font-size="8.5" text-anchor="middle">Mininet</text>

  <text x="620" y="432" fill="#333" font-size="10" font-weight="600" text-anchor="middle">拓扑模板</text>
  <text x="620" y="448" fill="#777" font-size="9"   text-anchor="middle">Linear · Ring · Multipath · Fat-Tree</text>

  <!-- ─── ARROW MARKER ──────────────────────────────────────── -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
  </defs>

</svg>
