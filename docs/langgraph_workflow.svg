<svg viewBox="0 0 620 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#777"/>
    </marker>
  </defs>

  <rect width="620" height="480" fill="#ffffff"/>

  <!-- START Node -->
  <rect x="260" y="20" width="80" height="30" rx="15" fill="#333"/>
  <text x="300" y="39" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">START</text>

  <!-- Agent Node -->
  <rect x="230" y="90" width="140" height="60" rx="5" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="115" fill="#333" font-size="11" font-weight="600" text-anchor="middle">Agent Node</text>
  <text x="300" y="132" fill="#666" font-size="9" text-anchor="middle">LLM 规划与工具分发</text>

  <!-- Tools Node -->
  <rect x="440" y="90" width="140" height="60" rx="5" fill="#f9f9f9" stroke="#777" stroke-width="1"/>
  <text x="510" y="115" fill="#333" font-size="11" font-weight="600" text-anchor="middle">Tools Node</text>
  <text x="510" y="132" fill="#666" font-size="9" text-anchor="middle">拓扑查询 / 策略回溯</text>

  <!-- Execute Node -->
  <rect x="220" y="260" width="160" height="70" rx="5" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="285" fill="#333" font-size="11" font-weight="600" text-anchor="middle">Execute &amp; Finish</text>
  <text x="300" y="302" fill="#666" font-size="9" text-anchor="middle">意图校验 &amp; 策略下发</text>
  <text x="300" y="316" fill="#aaa" font-size="8.5" text-anchor="middle">Validator + Executor</text>

  <!-- END Node -->
  <rect x="260" y="410" width="80" height="30" rx="15" fill="#333"/>
  <text x="300" y="429" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">END</text>

  <!-- ══════════════════════════════════════════════════
       Edges & Paths 
  ══════════════════════════════════════════════════ -->

  <!-- START -> Agent -->
  <path d="M 300 50 L 300 90" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Agent -> Tools -->
  <path d="M 370 110 L 440 110" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <text x="405" y="103" fill="#666" font-size="8.5" text-anchor="middle">普通工具调用</text>

  <!-- Tools -> Agent -->
  <path d="M 440 130 L 370 130" fill="none" stroke="#555" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <text x="405" y="145" fill="#666" font-size="8.5" text-anchor="middle">返回查询结果</text>

  <!-- Agent -> Execute -->
  <path d="M 300 150 L 300 260" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="210" y="195" width="180" height="20" rx="4" fill="#fff"/>
  <text x="300" y="209" fill="#333" font-size="9" font-weight="600" text-anchor="middle">输出 IntentList / Clarification</text>

  <!-- Agent -> END -->
  <path d="M 230 120 L 70 120 L 70 425 L 260 425" fill="none" stroke="#777" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="150" y="113" fill="#777" font-size="8.5" text-anchor="middle">无工具调用 (普通对话)</text>

  <!-- Execute -> Agent (ReAct) -->
  <path d="M 220 295 L 120 295 L 120 140 L 230 140" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <rect x="80" y="205" width="80" height="30" fill="#fff"/>
  <text x="120" y="217" fill="#333" font-size="9" font-weight="600" text-anchor="middle">校验报错反馈</text>
  <text x="120" y="230" fill="#777" font-size="8" text-anchor="middle">(ReAct 修正重试)</text>

  <!-- Execute -> END -->
  <path d="M 300 330 L 300 410" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="220" y="360" width="160" height="20" rx="4" fill="#fff"/>
  <text x="300" y="373" fill="#333" font-size="9" font-weight="600" text-anchor="middle">执行完毕 / 生成冲突报告</text>

</svg>
